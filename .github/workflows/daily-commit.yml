name: Daily Auto Commit

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Generate activity log
        run: |
          mkdir -p .github/logs

          COMMIT_COUNT=$(git rev-list --count HEAD)
          RUN_NUM=${{ github.run_number }}
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          DAY_OF_YEAR=$(date -u '+%j')
          WEEK=$(date -u '+%V')

          FACTS=(
            "Consistency beats intensity."
            "Small steps compound."
            "One more green square."
            "Keep the streak alive."
            "Progress over perfection."
          )
          FACT="${FACTS[$RANDOM % ${#FACTS[@]}]}"

          cat > .github/logs/activity.log << EOF
          Last run  : $TIMESTAMP
          Run #     : $RUN_NUM
          Commits   : $COMMIT_COUNT total
          Day       : $DAY_OF_YEAR / 365  (week $WEEK)
          Note      : $FACT
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/logs/activity.log
          git diff --staged --quiet || \
            git commit -m "chore: activity log [$(date -u '+%Y-%m-%d %H:%M')] run #${{ github.run_number }}"
          git pull --rebase origin main
          git push
