name: Natural Contribution Generator

on:
  schedule:
    # run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  generate-activity:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Generate natural commits
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p .github/activity

          # Random chance of no activity (natural gaps)
          ACTIVE_DAY=$((RANDOM % 100))

          if [ $ACTIVE_DAY -lt 30 ]; then
            echo "Rest day - no commits"
            exit 0
          fi

          # Random number of commits (2–20)
          COMMITS=$(( (RANDOM % 18) + 2 ))

          echo "Creating $COMMITS commits"

          for i in $(seq 1 $COMMITS)
          do
            FILE=".github/activity/activity_$RANDOM.txt"

            echo "Activity $(date -u '+%Y-%m-%d %H:%M:%S UTC') $RANDOM" >> $FILE

            git add $FILE

            MSGS=(
              "update docs"
              "refactor module"
              "fix minor bug"
              "improve logging"
              "update configs"
              "cleanup code"
              "improve performance"
              "update dependencies"
              "minor improvements"
              "fix lint issues"
            )

            MSG=${MSGS[$RANDOM % ${#MSGS[@]}]}

            git commit -m "$MSG"

            sleep $((RANDOM % 10))

          done

          # pull latest repo changes before push
          git pull --rebase origin main

          git push origin main
