name: Natural Contribution Generator

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create activity file
        run: |
          mkdir -p .github/logs
          echo "Activity at $(date)" >> .github/logs/activity.txt

      - name: Commit and push automatically
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update activity log"
